<!DOCTYPE html>
<html>

<head>
	<title>SignWriting extensions demo</title>
	<script src="demo.js" type="module"></script>
	<link rel="stylesheet" href="demo.css" />
</head>

<body>
	<h1>SignWriting extensions demo</h1>
	<section id="symbolDemo">
		<h2>Symbol</h2>
		<div class="demoArea">
			<div id="symOrig">
				<h3>Original</h3>
				<form class="optionsArea">
					<div class="inputArea">
						<label for="symbolFsw">Symbol FSW:</label>
						<input type="text" id="symbolFsw" />
					</div>
				</form>
				<div class="renderArea"></div>
			</div>
			<div id="symbolInfo">
				<h3>Info</h3>
				<div class="outputArea"></div>
			</div>
			<div id="symbolDesc">
				<h3>Description</h3>
				<div class="outputArea"></div>
			</div>
			<div id="symbolHands">
				<h3>Change hands</h3>
				<div class="renderArea"></div>
				<div class="outputArea"></div>
			</div>
			<div id="symbolMirror">
				<h3>Mirror</h3>
				<div class="renderArea"></div>
				<div class="outputArea"></div>
			</div>
			<div id="symbolPerspective">
				<h3>Change perspective</h3>
				<div class="renderArea"></div>
				<div class="outputArea"></div>
			</div>
			<div id="symbolSides">
				<h3>Swap horizontal</h3>
				<div class="renderArea"></div>
				<div class="outputArea"></div>
			</div>
		</div>
		<button type="button" name="symbolModify" value="mirror" id="symbolModifyMirror">Mirror</button>
		<button type="button" name="symbolModify" value="hands" id="symbolModifyHands">Swap hands</button>
		<button type="button" name="symbolModify" value="perspective" id="symbolModifyPerspective">Swap perspective</button>
		<button type="button" name="symbolModify" value="sides" id="symbolModifySides">Flip sides</button>
	</section>
	<section id="signDemo">
		<h2>Sign</h2>
		<div class="demoArea">
			<div id="signOrig">
				<form class="optionsArea">
					<div class="inputArea">
						<label for="signFsw">Sign FSW:</label>
						<input type="text" id="signFsw" />
					</div>
				</form>
				<div class="renderArea"></div>
			</div>
			<div id="signInfo">
				<h3>Info</h3>
				<div class="outputArea"></div>
			</div>
			<div id="signDesc">
				<h3>Description</h3>
				<div class="outputArea"></div>
			</div>
			<div id="signSequence">
				<h3>Sequence</h3>
				<div class="renderArea"></div>
			</div>
			<div id="signMirror">
				<h3>Mirrored</h3>
				<div class="renderArea"></div>
				<div class="outputArea"></div>
			</div>
			<div id="signPerspective">
				<h3>Perspective reversed</h3>
				<div class="renderArea"></div>
				<div class="outputArea"></div>
			</div>
		</div>
		<button type="button" name="signModify" value="flipX" id="signModifyFlipX">Mirror</button>
		<!--<button type="button" name="signModify" value="flipZ" id="signModifyFlipZ"> Flip Z</button>-->
		<button type="button" name="signModify" value="flipXZ" id="signModifyFlipXZ">Reverse perspective</button>
		<button type="button" name="signModify" value="sequence" id="signModifySequence">Generate temporal segment</button>
	</section>
</body>

</html>
