<!DOCTYPE html>
<html>
	<head>
		<title>SignWriting extensions demo</title>
		<script src="demo.js" type="module"></script>
		<link rel="stylesheet" href="demo.css"/>
	</head>
	<body>
		<h1>SignWriting extensions demo</h1>
		<div id="symbolDemo" class="demoArea">
			<div class="renderArea"></div>
			<form class="optionsArea">
				<div class="inputArea">
					<label for="symbolFsw">Symbol FSW:</label>
					<input type="text" id="symbolFsw" />
				</div>
				<fieldset class="infoArea" id="symbolInfo">
					<legend>Info</legend>
					<button type="button" name="symbolInfo" value="left" id="symbolInfoLeft">Left hand</button>
					<button type="button" name="symbolInfo" value="right" id="symbolInfoRight">Right hand</button>
					<button type="button" name="symbolInfo" value="both" id="symbolInfoBoth">Both hands</button>
					<button type="button" name="symbolInfo" value="floor" id="symbolInfoFloor">Floor plane</button>
					<button type="button" name="symbolInfo" value="wall" id="symbolInfoWall">Wall plane</button>
					<button type="button" name="symbolInfo" value="diagonal" id="symbolInfoDiagonal">Diagonal plane</button>
					<button type="button" name="symbolInfo" value="width" id="symbolInfoWidth">Width</button>

				</fieldset>
				<fieldset class="modifyArea">
					<legend>Modify</legend>
					<button type="button" name="symbolModify" value="mirror" id="symbolModifyMirror">Mirror</button>
					<button type="button" name="symbolModify" value="hands" id="symbolModifyHands">Swap hands</button>
					<!--
					<button type="button" name="symbolModify" value="plane" id="symbolModifyPlane">Swap plane</button>
					-->
					<button type="button" name="symbolModify" value="sides" id="symbolModifySides">Flip sides</button>

				</fieldset>
			</form>
			<div class="outputArea"></div>
		</div>
		<div id="signDemo" class="demoArea">
			<div class="renderArea"></div>
			<form class="optionsArea">
				<div class="inputArea">
					<label for="signFsw">Sign FSW:</label>
					<input type="text" id="signFsw" />
				</div>
				<fieldset class="infoArea" id="signInfo">
					<legend>Info</legend>
					<button type="button" name="signInfo" value="describe" id="signInfoDescribe"> Describe sign</button>
			
				</fieldset>
				<fieldset class="modifyArea">
					<legend>Modify</legend>
					<button type="button" name="signModify" value="flipX" id="signModifyFlipX"> Flip X</button>
					<button type="button" name="signModify" value="flipZ" id="signModifyFlipZ"> Flip Z</button>
					<button type="button" name="signModify" value="flipXZ" id="signModifyFlipXZ"> Flip XZ</button>
					<button type="button" name="signModify" value="sequence" id="signModifySequence"> Generate temporal segment</button>

				</fieldset>
			</form>
			<div class="outputArea"></div>
		</div>
		<div id="mirrorArea" style="display: grid; grid-template-columns: max-content max-content max-content max-content;">

		</div>
	</body>
</html>
