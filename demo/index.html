<!DOCTYPE html>
<html>

<head>
	<title>SignWriting extensions demo</title>
	<script src="demo.js" type="module"></script>
	<link rel="stylesheet" href="demo.css" />
</head>

<body>
	<h1>SignWriting extensions demo</h1>
	<section id="symbolDemo">
		<h2>Symbol</h2>
		<div class="demoArea">
			<div id="symOrig">
				<h3>Original</h3>
				<form class="optionsArea">
					<div class="inputArea">
						<label for="symbolFsw">Symbol FSW:</label>
						<input type="text" id="symbolFsw" />
					</div>
				</form>
				<div class="renderArea"></div>
			</div>
			<div id="symbolInfo">
				<h3>Info</h3>
				<div class="outputArea"></div>
			</div>
			<div id="symbolMirror">
				<h3>Mirror</h3>
				<div class="outputArea"></div>
				<div class="renderArea"></div>
			</div>
			<div id="symbolHands">
				<h3>Change hands</h3>
				<div class="outputArea"></div>
				<div class="renderArea"></div>
			</div>
			<div id="symbolPerspective">
				<h3>Change perspective</h3>
				<div class="outputArea"></div>
				<div class="renderArea"></div>
			</div>
			<div id="symbolSides">
				<h3>Swap horizontal</h3>
				<div class="outputArea"></div>
				<div class="renderArea"></div>
			</div>
		</div>
					<button type="button" name="symbolModify" value="mirror" id="symbolModifyMirror">Mirror</button>
					<button type="button" name="symbolModify" value="hands" id="symbolModifyHands">Swap hands</button>
										<button type="button" name="symbolModify" value="perspective" id="symbolModifyPerspective">Swap perspective</button>
					<button type="button" name="symbolModify" value="sides" id="symbolModifySides">Flip sides</button>
	</section>
	<section id="signDemo">
		<h2>Sign</h2>
		<div class="demoArea">
			<div class="renderArea"></div>
			<form class="optionsArea">
				<div class="inputArea">
					<label for="signFsw">Sign FSW:</label>
					<input type="text" id="signFsw" />
				</div>
			</form>
			<div class="outputArea"></div>
		</div>
	</section>
</body>

</html>
